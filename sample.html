<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>temp</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            max-width: 500px;
        }
        th, td {
            border: 1px solid #333;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>    
    
    <script>
    // タイトルをhtmlファイル名に修正
  const fileName = window.location.pathname.split('/').pop();
  const nameWithoutExt = fileName.replace(/\.[^/.]+$/, "");
  document.title = nameWithoutExt;
</script>

</head>
<body>

    <h2>テーブル例</h2>
    <table>
        <tr>
            <th>名前</th>
            <th>年齢</th>
        </tr>
        <tr>
            <td>山田 太郎</td>
            <td>25</td>
        </tr>
        <tr>
            <td>佐藤 花子</td>
            <td>30</td>
        </tr>
    </table>

</body>
</html>
